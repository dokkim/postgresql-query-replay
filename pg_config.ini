[postgresql]
host = your-rds-postgresql-endpoint.amazonaws.com
port = 5432
user = postgres
password = your-password
database = your-database-name

[settings]
# 최대 실행할 쿼리 수 (0 = 모든 쿼리)
max_queries = 100
# 쿼리 타임아웃 (초)
query_timeout = 30
# 결과 출력 파일명
output_file = pg_query_performance_report.csv
# 캐시 클리어 여부 (true/false) - 주의: 성능에 영향
clear_cache = false
# 최소 실행 시간 필터 (밀리초) - 이보다 짧은 쿼리는 제외
min_duration_ms = 0